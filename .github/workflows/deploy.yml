name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.PROJECT_ID }}
        install_components: 'gke-gcloud-auth-plugin'
        # installs the plugin the GitHub Actions runner needs to talk to GKE

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker --quiet

    - name: Build and push image
      run: |
        docker buildx build \
          --platform linux/amd64 \
          -t gcr.io/${{ secrets.PROJECT_ID }}/modernization-demo-app:${{ github.sha }} \
          --push .

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials modernization-demo \
          --zone us-central1-a
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True
        # tells gcloud to use the plugin we just installed

    - name: Deploy to GKE
      run: |
        kubectl set image deployment/demo-app \
          app=gcr.io/${{ secrets.PROJECT_ID }}/modernization-demo-app:${{ github.sha }}
        kubectl rollout status deployment/demo-app
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: True